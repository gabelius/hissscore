<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Snake Gwame</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
</head>
<body>
    <div class="game-header">
        <div class="level-info">
            <span class="level-number">Level <span id="levelNumber">1</span></span>
            <span class="level-name" id="levelName">Slithering Start</span>
        </div>
        <div>⏳ <span id="timer">0</span>s</div>
        <div class="hearts" id="hearts">❤❤❤</div>
        <div>🏆 <span id="score">0</span></div>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <!-- The game over overlay will be dynamically inserted here -->
    </div>

    <div class="controls">
        <button id="startBtn" title="Start/Pause Game">⏵</button>
        <button id="autoBtn" title="Auto Play">🤖</button>
        <button id="speedBtn" title="Increase Speed">⚡</button>
        <button id="themeToggle" title="Toggle Theme">🌓</button>
        <select id="colorMode" title="Color Theme">
            <option value="rainbow-mode">🌈</option>
            <option value="pastel-mode">🎨</option>
            <option value="neon-mode">🌆</option>
            <option value="grayscale-mode">⚫</option>
        </select>
    </div>

    <!-- Change script tag to use type="module" -->
    <script src="script.js" type="module"></script>
</body>
</html>

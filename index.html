<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Snake Game</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-header">
        <div class="level-info">
            <span class="level-number">Level <span id="levelNumber">0</span></span>
            <span class="level-name" id="levelName"></span>
        </div>
        <div>⏳ <span id="timer">0</span>s</div>
        <div class="hearts" id="hearts">❤❤❤</div>
        <div>🏆 <span id="score">0</span></div>
    </div>

    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <!-- The game over overlay will be dynamically inserted here -->
    </div>

    <div class="controls">
        <button id="startBtn" title="Start Game">▶️</button>
        <button id="autoBtn" title="Auto Mode">🤖</button>
        <button id="muteBtn" title="Mute">🔊</button>
        <button id="speedBtn" title="Speed">⚡</button>
        <button id="themeToggle" title="Theme">🌓</button>
        <select id="colorMode" title="Colors">
            <option value="rainbow-mode">🌈</option>
            <option value="pastel-mode">🎨</option>
            <option value="neon-mode">💫</option>
            <option value="grayscale-mode">⚪</option>
        </select>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js" defer></script>
    <script type="module" src="game.js" defer></script>
</body>
</html>

# Game Configuration
game:
    tileSize: 20
    tileCount: 20
    updateInterval: 150
    minSwipeDistance: 30
    autoStartDelay: 0 # Set to 0 to start auto mode immediately
    riddleCycleTime: 15

# Color Schemes
colorSchemes:
    rainbow:
        - "#FF6B6B"
        - "#FFD93D"
        - "#6BFF6B"
        - "#4ECDC4"
        - "#9B59B6"
    pastel:
        - "#FFB3BA"
        - "#FFDFBA"
        - "#FFFFBA"
        - "#BAFFC9"
        - "#BAE1FF"
    neon:
        - "#FF00FF"
        - "#00FFFF"
        - "#FF0000"
        - "#00FF00"
        - "#FFFF00"
    grayscale:
        - "#999"
        - "#777"
        - "#555"
        - "#333"

# Riddles
riddles:
    - question: "I slither through time, always moving forward but never backward. What am I?"
      answer: "Time! ⏳ (Like a snake, it moves in one direction)"
    - question: "I coil around your thoughts, always present but never seen. I can be broken but never touched. What am I?"
      answer: "Silence! 🤫 (Silence wraps around thoughts like a snake)"
    - question: "I hiss in the wind, yet I have no voice. I can be gentle or fierce, yet I am not alive. What am I?"
      answer: "A storm! 🌪️ (The wind 'hisses' like a snake)"
    - question: "I shed my skin every day, yet I am not a snake. I grow taller but never older. What am I?"
      answer: "A tree! 🌳 (Bark sheds like snake skin)"

# Snake Facts (if needed)
snakeFacts:
    - "Snakes can smell with their tongues! 👅"
    - "Some snakes can glide over 100 meters! ✈️"
    - "Snakes have 5 ways to move! 🕺"
    - "The fastest snake moves at 12 mph! 🏎️"

# Level Names
levels:
    - name: "The Green Meadow"
      background: "img/1.webp"
      snakeColors: ["#00FF00"]
      scoreThreshold: 100
    - name: "The Desert Mirage"
      background: "img/2.webp"
      snakeColors: ["#C2B280"]
      scoreThreshold: 200
    - name: "The Mystic Forest"
      background: "img/3.webp"

# Game Configuration
game:
    tileSize: 20
    tileCount: 20
    updateInterval: 150
    minSwipeDistance: 30
    autoStartDelay: 5
    riddleCycleTime: 15
  
# Color Schemes
colorSchemes:
    rainbow:
      - "#FF6B6B"
      - "#FFD93D"
      - "#6BFF6B"
      - "#4ECDC4"
      - "#9B59B6"
    pastel:
      - "#FFB3BA"
      - "#FFDFBA"
      - "#FFFFBA"
      - "#BAFFC9"
      - "#BAE1FF"
    neon:
      - "#FF00FF"
      - "#00FFFF"
      - "#FF0000"
      - "#00FF00"
      - "#FFFF00"
    grayscale:
      - "#999"
      - "#777"
      - "#555"
      - "#333"

# Level Themes
levels:
    - name: "The Green Meadow"
      snakeColor: "green"
      backgroundImage: "1.webp"
    - name: "The Desert Mirage"
      snakeColor: "sandybrown"
      backgroundImage: "2.webp"
    - name: "The Mystic Forest"
      snakeColor: "darkgreen"
      backgroundImage: "3.webp"
    - name: "The Arctic Tundra"
      snakeColor: "iceblue"
      backgroundImage: "4.webp"
    - name: "The Molten Core"
      snakeColor: "lavared"
      backgroundImage: "5.webp"
    - name: "The Starry Night"
      snakeColor: "neonblue"
      backgroundImage: "6.webp"
    - name: "The Ocean Depths"
      snakeColor: "deepseateal"
      backgroundImage: "7.webp"
    - name: "The Golden Sands"
      snakeColor: "goldenyellow"
      backgroundImage: "8.webp"
    - name: "The Thunder Plains"
      snakeColor: "electricpurple"
      backgroundImage: "9.webp"
    - name: "The Cosmic Void"
      snakeColor: "cosmicblack"
      backgroundImage: "10.webp"
  
# Riddles
riddles:
    - question: "I slither through time, always moving forward but never backward. What am I?"
      answer: "Time! ⏳ (Like a snake, it moves in one direction)"
    - question: "I coil around your thoughts, always present but never seen. I can be broken but never touched. What am I?"
      answer: "Silence! 🤫 (Silence wraps around thoughts like a snake)"
    - question: "I hiss in the wind, yet I have no voice. I can be gentle or fierce, yet I am not alive. What am I?"
      answer: "A storm! 🌪️ (The wind 'hisses' like a snake)"
    - question: "I shed my skin every day, yet I am not a snake. I grow taller but never older. What am I?"
      answer: "A tree! 🌳 (Bark sheds like snake skin)"
  
# Snake Facts (if needed)
snakeFacts:
    - "Snakes can smell with their tongues! 👅"
    - "Some snakes can glide over 100 meters! ✈️"
    - "Snakes have 5 ways to move! 🕺"
    - "The fastest snake moves at 12 mph! 🏎️"